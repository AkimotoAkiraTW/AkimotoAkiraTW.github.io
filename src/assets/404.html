<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA routing: stores the current URL and redirects to index.html
      sessionStorage.redirect = location.href;
      location.replace('/');
    </script>

</html>
