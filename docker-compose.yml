# =====================================================
# docker-compose.yml - Angular 21 開發環境編排
# 使用方式：
#   啟動開發伺服器 -> docker-compose up
#   停止            -> docker-compose down
#   進入容器 Shell  -> docker-compose exec dev sh
#   安裝新套件      -> docker-compose exec dev npm install <package>
# =====================================================

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: angular_portfolio_dev

    volumes:
      # 掛載原始碼（雙向同步，你在 VS Code 修改，容器立即熱重載）
      - .:/app

      # ⚠️ 關鍵：用 named volume 隔離 node_modules
      # 避免 Windows 與 Linux 的路徑/二進位檔不相容問題
      - portfolio_node_modules:/app/node_modules

      # 掛載 SSH 設定（唯讀），讓容器內可以 git push
      # Windows Docker Desktop 路徑：使用 SSH Agent 轉發
      - ${USERPROFILE}/.ssh:/root/.ssh:ro

    ports:
      # Angular dev server：本地 localhost:4200 對應容器 4200
      - "4200:4200"

    environment:
      # Angular CLI 在 Docker 內需要此設定來偵測檔案變更
      - CHOKIDAR_USEPOLLING=1
      - NODE_ENV=development

    # 保持容器在 TTY 模式運行
    stdin_open: true
    tty: true

    working_dir: /app

    # 覆寫預設 CMD，明確指定啟動指令
    command: >
      ng serve portfolio
      --host 0.0.0.0
      --poll 1000

# Named volume：node_modules 存在 Docker 內部，不受主機路徑影響
volumes:
  portfolio_node_modules:
